name: Webpage Content Monitor

on:
  schedule:
    # Runs daily at 8 AM Asia/Shanghai (0:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run content monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python monitor.py
      
      - name: Commit changes if detected
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.md
          git diff --staged --quiet || git commit -m "Update content files - webpage changes detected [skip ci]"
          git push